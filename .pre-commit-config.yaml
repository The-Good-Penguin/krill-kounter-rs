repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.5
    hooks:
      - id: codespell
        args: ["-L","hte,teh,crate,FILE"]
        files: \.(py|md|txt|rst|c|cpp|h|yaml|rst|rs)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v1.2.3
    hooks:
    -   id: trailing-whitespace

  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        description: "Running code format with `rustfmt`"
        entry: rustfmt
        language: system
        types: [rust]
        args: ['--edition', '2021']

  - repo: local
    hooks:
    - id: cargo-clippy
      name: cargo clippy
      language: system
      entry: cargo clippy -- --deny warnings
      always_run: true
      pass_filenames: false
      files: \.rs$
