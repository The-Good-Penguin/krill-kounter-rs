name: On main

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [review_requested, edited, synchronize]

env:
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: [tgp-aws]
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt update && apt-get install -y curl build-essential

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce formatting
        run: cargo fmt

  clippy:
    name: clippy
    runs-on: [tgp-aws]
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt update && apt-get install -y curl build-essential

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
      - name: Linting
        run: cargo clippy -- -D warnings

  docs:
    name: docs
    runs-on: [tgp-aws]
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt update && apt-get install -y curl build-essential

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
      - name: docs
        run: cargo doc --no-deps

  build:
    name: build
    runs-on: [tgp-aws]
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt update && apt-get install -y curl build-essential

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
      - name: Build image
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp ./target/release/krill-kounter-rs artifacts/krill-kounter-rs
          cp ./install/service/krill-kounter-rs.service artifacts/krill-kounter-rs.service

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krill-kounter-rs
          path: artifacts/
          if-no-files-found: error